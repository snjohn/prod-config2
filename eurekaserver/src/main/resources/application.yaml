server:
  port: 8761

spring:
  application:
    name: eurekaserver

eureka:
  instance:
    hostname: eurekaserver
  client:
    # Disable Eureka from registering itself as a client
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/
  server:
    # Disable self-preservation mode in dev (should be enabled in production)
    enable-self-preservation: false
    eviction-interval-timer-in-ms: 5000

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
