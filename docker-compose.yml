version: '3.8'

services:
  # 1. Frontend Builder: Compiles React code
  frontend-builder:
    container_name: frontend-builder
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: >
      sh -c "npm install && npm run build"
    networks:
      - microservices-net

  # 3. NGINX: Serves the static files
  nginx:
    container_name: nginx
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # This links the build output from the builder to NGINX
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - frontend-builder
      - gateway
    networks:
      - microservices-net

  # 4. Spring Cloud Gateway
  gateway:
    container_name: gateway
    build:
      context: .
      dockerfile: gateway/Dockerfile
    ports:
      - "8081:8080"
    # Resource limits to prevent container from consuming all host resources
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://gateway:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    environment:
      - SPRING_CLOUD_DISCOVERY_ENABLED=true
      - SPRING_SESSION_STORE_TYPE=redis
    depends_on:
      eurekaserver:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      redis:
        condition: service_started
    restart: on-failure
    networks:
      - microservices-net

  # 5. Backend Microservice
  backend:
    container_name: backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=http://keycloak:8080/realms/myrealm
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eurekaserver:8761/eureka/
    depends_on:
      eurekaserver:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    restart: on-failure
    networks:
      - microservices-net

  # 6. Keycloak Identity Server
  keycloak:
    container_name: keycloak
    image: quay.io/keycloak/keycloak:latest
    command: start-dev --import-realm
    ports:
      - "8080:8080"
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    volumes:
      # Persist Keycloak data (H2 database, uploaded themes, etc.)
      - keycloak-data:/opt/keycloak/data
      # Import realm configuration on startup
      - ./keycloak/realms:/opt/keycloak/data/import:ro
    healthcheck:
      test: ["CMD", "timeout", "1", "bash", "-c", "echo > /dev/tcp/127.0.0.1/8080"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - microservices-net

# 4. Redis (for Session Persistence)
  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure
    networks:
      - microservices-net

  # 2. Eureka Service Discovery
  eurekaserver:
    container_name: eurekaserver
    build:
      context: .
      dockerfile: eurekaserver/Dockerfile
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://eurekaserver:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - microservices-net

networks:
  microservices-net:
    driver: bridge
    name: microservices-network

volumes:
  keycloak-data:
    driver: local