spring:
  application:
    name: gateway

  # Limit request/response body size to prevent memory exhaustion attacks
  codec:
    max-in-memory-size: 10MB  # Adjust based on your use case

  session:
    timeout: 30m
    redis:
      namespace: spring:session:gateway
      flush-mode: on_save
      cleanup-cron: "0 */5 * * * *"
  
  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD:}
      connect-timeout: 5s
      timeout: 3s

  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: gateway
            client-secret: ${OAUTH2_CLIENT_SECRET:secret}
            authorization-grant-type: authorization_code
            scope: openid,profile,email
        provider:
          keycloak:
            # Use localhost for all endpoints to avoid token issuer mismatch
            # The gateway container needs to access Keycloak via the host network
            issuer-uri: ${KEYCLOAK_ISSUER_URI:http://keycloak:8080/realms/myrealm}
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://keycloak:8080/realms/myrealm}

  cloud:
    gateway:
      routes:
        - id: backend-service
          uri: lb://backend
          predicates:
            - Path=/api/**
          filters:
            - TokenRelay # This automatically passes the JWT to the backend
            
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "${CORS_ALLOWED_ORIGINS:http://localhost,http://localhost:3000}"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

eureka:
  client:
    service-url:
      defaultZone: http://eurekaserver:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

# patternslib.gateway.* defaults — override any of these per-environment via
# profile-specific config, environment variables, or -D system properties.
patternslib:
  gateway:
    security:
      enabled: true          # set false to disable the JWT filter chain (e.g. local dev)
    rate-limit:
      default-limit: 100          # requests per window when a route omits its own args
      default-window-seconds: 60

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always

logging:
  level:
    "[com.example.gateway]": INFO
    "[org.springframework.cloud.gateway]": INFO
    "[org.springframework.security]": DEBUG
    "[org.springframework.security.oauth2]": DEBUG
